<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dictation – HOBBIES</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4ff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 32px 28px;
    width: 100%;
    max-width: 600px;
  }
  h1 { font-size: 1.4rem; color: #3b4fc8; margin-bottom: 6px; letter-spacing: 1px; text-align: center; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 20px; text-align: center; }
  
  .progress { text-align: center; font-weight: bold; color: #3b4fc8; margin-bottom: 16px; font-size: 1.1rem; }
  
  .sentence {
    display: none; /* Ẩn tất cả các câu mặc định */
    background: #f7f9ff;
    border: 1.5px solid #dde3f8;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    transition: border 0.2s;
  }
  .sentence.active { display: block; } /* Chỉ hiện câu đang active */
  
  .sentence.correct { border-color: #4caf50; background: #f0fff4; }
  .sentence.wrong   { border-color: #f44336; background: #fff5f5; }
  
  .sentence-header  { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  audio { height: 40px; flex: 1; min-width: 0; }
  
  textarea {
    width: 100%;
    border: 1.5px solid #dde3f8;
    border-radius: 8px;
    padding: 12px;
    font-size: 1rem;
    font-family: inherit;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border 0.2s;
    background: white;
  }
  textarea:focus { border-color: #3b4fc8; }
  
  .feedback { font-size: 0.9rem; margin-top: 12px; min-height: 18px; display: none; padding: 8px; border-radius: 6px; }
  .feedback.show { display: block; }
  .feedback.ok  { color: #2e7d32; background: #e8f5e9; }
  .feedback.bad { color: #c62828; background: #ffebee; }
  .feedback.warn { color: #ef6c00; background: #fff3e0; }
  
  .btn-row { display: flex; gap: 10px; margin-top: 16px; }
  button {
    padding: 10px 18px; border: none; border-radius: 8px;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  
  .checkBtn { background: #3b4fc8; color: white; flex: 1; }
  .checkBtn:hover:not(:disabled) { background: #2d3da8; }
  .resetBtn { background: #eef0fb; color: #3b4fc8; }
  .resetBtn:hover:not(:disabled) { background: #dde3f8; }
  
  .nav-btns { display: flex; justify-content: space-between; margin-top: 24px; border-top: 1px solid #eee; padding-top: 20px;}
  .navBtn { background: #fff; border: 1.5px solid #3b4fc8; color: #3b4fc8; }
  .navBtn:hover:not(:disabled) { background: #eef0fb; }
  
  .score-box {
    display: none; margin-top: 20px; padding: 16px;
    border-radius: 10px; background: #eef0fb;
    text-align: center; font-size: 1.2rem; font-weight: 600; color: #3b4fc8;
  }
  .score-box.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <h1>🎧 DICTATION</h1>
  <div class="subtitle">Topic: HOBBIES &nbsp;·&nbsp; Nghe và gõ lại từng câu</div>
  
  <div class="progress" id="progressText">Câu 1 / 4</div>
  
  <div id="sentences"></div>
  
  <div class="nav-btns">
    <button class="navBtn" id="prevBtn" onclick="changePage(-1)">⬅ Câu trước</button>
    <button class="navBtn" id="nextBtn" onclick="changePage(1)">Câu tiếp ➡</button>
  </div>
  
  <div class="score-box" id="scoreBox"></div>
</div>

<script>
const DATA = [
  {
    audio: "audio/1.mp3",
    answer: "I like to collect things."
  },
  {
    audio: "audio/2.mp3",
    answer: "I collect comic books, stamps and coins."
  },
  {
    audio: "audio/3.mp3",
    answer: "I trade comic books with some of my friends,"
  },
  {
    audio: "audio/4.mp3",
    answer: "and sometimes I buy comic books at stores."
  }
];

let currentIndex = 0;
// Mảng lưu số lần sai của từng câu
let attempts = new Array(DATA.length).fill(0);
const MAX_ATTEMPTS = 3; // Số lần thử tối đa trước khi hiện đáp án

function normalize(str) {
  return str.trim().toLowerCase().replace(/[.,!?;:'"]/g, '');
}

function render() {
  const container = document.getElementById('sentences');
  container.innerHTML = '';
  
  DATA.forEach((item, i) => {
    container.innerHTML += `
      <div class="sentence ${i === 0 ? 'active' : ''}" id="s${i}">
        <div class="sentence-header">
          <audio id="audio${i}" controls src="${item.audio}" preload="none"></audio>
        </div>
        <textarea id="ta${i}" placeholder="Gõ câu bạn nghe được vào đây..."></textarea>
        <div class="btn-row">
          <button class="checkBtn" id="chk${i}" onclick="checkOne(${i})">✅ Kiểm tra</button>
          <button class="resetBtn" onclick="resetOne(${i})">🔄 Xóa gõ lại</button>
        </div>
        <div class="feedback" id="fb${i}"></div>
      </div>`;
  });
  
  updateNavButtons();
}

function checkOne(i) {
  const val = document.getElementById(`ta${i}`).value.trim();
  const fb  = document.getElementById(`fb${i}`);
  const box = document.getElementById(`s${i}`);
  const checkBtn = document.getElementById(`chk${i}`);
  
  // Bắt buộc phải gõ gì đó
  if (val === '') {
    fb.className = 'feedback show warn';
    fb.innerHTML = '⚠️ Bạn chưa gõ gì cả. Hãy nghe và thử gõ lại nhé!';
    return;
  }

  // Kiểm tra đáp án
  if (normalize(val) === normalize(DATA[i].answer)) {
    box.className = 'sentence active correct';
    fb.className = 'feedback show ok';
    fb.innerHTML = '✅ Chính xác! Giỏi lắm.';
    checkBtn.disabled = true; // Khóa nút kiểm tra
    
    // Nếu làm xong câu cuối, hiện nút Tổng kết
    if (currentIndex === DATA.length - 1) {
        checkAllDone();
    }
  } else {
    attempts[i]++;
    box.className = 'sentence active wrong';
    
    if (attempts[i] >= MAX_ATTEMPTS) {
        fb.className = 'feedback show bad';
        fb.innerHTML = `❌ Bạn đã thử ${MAX_ATTEMPTS} lần. <br>Đáp án là: <strong>${DATA[i].answer}</strong>`;
        checkBtn.disabled = true; // Khóa nút kiểm tra
    } else {
        const left = MAX_ATTEMPTS - attempts[i];
        fb.className = 'feedback show warn';
        fb.innerHTML = `❌ Sai rồi. Bạn còn <strong>${left} lần thử</strong>. Hãy nghe thật kỹ lại nhé!`;
    }
  }
}

function resetOne(i) {
  const checkBtn = document.getElementById(`chk${i}`);
  if(checkBtn.disabled && attempts[i] < MAX_ATTEMPTS) {
     // Không cho reset nếu đã làm đúng (trừ khi muốn cho làm lại từ đầu)
     return;
  }
  
  document.getElementById(`ta${i}`).value = '';
  document.getElementById(`fb${i}`).className = 'feedback';
  document.getElementById(`s${i}`).className = 'sentence active';
  
  // Trả lại trạng thái ban đầu nếu chưa bị khóa do sai quá số lần
  if (attempts[i] < MAX_ATTEMPTS) {
    checkBtn.disabled = false;
  }
}

function changePage(direction) {
  // Dừng audio đang phát khi chuyển trang
  const currentAudio = document.getElementById(`audio${currentIndex}`);
  if(currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
  }

  // Ẩn câu hiện tại
  document.getElementById(`s${currentIndex}`).classList.remove('active');
  
  // Cập nhật index
  currentIndex += direction;
  
  // Hiện câu mới
  document.getElementById(`s${currentIndex}`).classList.add('active');
  
  updateNavButtons();
}

function updateNavButtons() {
  document.getElementById('progressText').textContent = `Câu ${currentIndex + 1} / ${DATA.length}`;
  
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  
  prevBtn.disabled = currentIndex === 0;
  
  if (currentIndex === DATA.length - 1) {
    nextBtn.textContent = "Hoàn thành 🏁";
    nextBtn.onclick = checkAllDone;
  } else {
    nextBtn.textContent = "Câu tiếp ➡";
    nextBtn.onclick = () => changePage(1);
  }
}

function checkAllDone() {
  let correct = 0;
  DATA.forEach((item, i) => {
    const fb = document.getElementById(`fb${i}`);
    if (fb.classList.contains('ok')) correct++;
  });
  const scoreBox = document.getElementById('scoreBox');
  scoreBox.className = 'score-box show';
  scoreBox.innerHTML = `🏆 Kết quả: <strong>${correct} / ${DATA.length}</strong> câu đúng!`;
}

// Khởi tạo
render();
</script>
</body>
</html>
